name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  FORCE_NODE24: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        postgres: [with-postgres, without-postgres]
    steps:
      - uses: actions/checkout@v5

      - name: Use system CMake
        run: sudo rm -rf /usr/local/bin/cmake /usr/local/share/cmake* /usr/local/doc/cmake /usr/local/man/man1/cmake*

      - name: Install dependencies (without PostgreSQL)
        if: matrix.postgres == 'without-postgres'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc libcurl4-openssl-dev libsqlite3-dev

      - name: Install dependencies (with PostgreSQL)
        if: matrix.postgres == 'with-postgres'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc libcurl4-openssl-dev libsqlite3-dev libpq-dev

      - name: Configure
        run: cmake -DBUILD_TESTS=ON -S . -B build

      - name: Build
        run: cmake --build build

      - name: Test
        run: cd build && ctest --output-on-failure --no-tests=error -T Test

      - name: Convert CTest results to JUnit XML
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET
          import glob

          test_xml = glob.glob("build/Testing/*/Test.xml")
          if not test_xml:
              print("No CTest results found")
              exit(1)

          ctest_tree = ET.parse(test_xml[0])
          ctest_root = ctest_tree.getroot()

          testsuites = ET.Element("testsuites")
          testsuite = ET.SubElement(testsuites, "testsuite", {
              "name": "kaufbot_tests",
              "tests": "0",
              "failures": "0",
              "errors": "0",
              "time": "0"
          })

          total_time = 0.0
          for test in ctest_root.findall(".//Test"):
              name = test.get("Name")
              status = test.get("Status")
              time_elem = test.find("Results/NamedMeasurement[@name='Execution Time']/Value")
              time_val = float(time_elem.text) if time_elem is not None and time_elem.text else 0.0
              total_time += time_val

              testcase = ET.SubElement(testsuite, "testcase", {
                  "name": name,
                  "classname": "kaufbot_tests",
                  "time": str(time_val)
              })

              if status != "passed":
                  failure = ET.SubElement(testcase, "failure")
                  failure.text = f"Test {name} failed with status: {status}"

              testsuite.set("tests", str(int(testsuite.get("tests")) + 1))
              if status != "passed":
                  testsuite.set("failures", str(int(testsuite.get("failures")) + 1))

          testsuite.set("time", str(total_time))

          # Write with proper XML declaration and formatting
          tree = ET.ElementTree(testsuites)
          ET.indent(tree, space="  ")
          tree.write("build/test-results.xml", encoding="utf-8", xml_declaration=True)
          print("JUnit XML generated: build/test-results.xml")
          EOF

      - name: Publish Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          junit_files: build/test-results.xml
          check_name: Test Results (${{ matrix.postgres }})
          comment_mode: always

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Use system CMake
        run: sudo rm -rf /usr/local/bin/cmake /usr/local/share/cmake* /usr/local/doc/cmake /usr/local/man/man1/cmake*

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc libcurl4-openssl-dev libsqlite3-dev clang-tidy cppcheck

      - name: Configure
        run: cmake -DBUILD_TESTS=ON -S . -B build

      - name: clang-tidy
        run: cmake --build build --target lint

      - name: cppcheck
        run: cmake --build build --target cppcheck

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Use system CMake
        run: sudo rm -rf /usr/local/bin/cmake /usr/local/share/cmake* /usr/local/doc/cmake /usr/local/man/man1/cmake*

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc libcurl4-openssl-dev libsqlite3-dev clang-format

      - name: Configure
        run: cmake -S . -B build

      - name: Check formatting
        run: cmake --build build --target format-check

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Use system CMake
        run: sudo rm -rf /usr/local/bin/cmake /usr/local/share/cmake* /usr/local/doc/cmake /usr/local/man/man1/cmake*

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc libcurl4-openssl-dev libsqlite3-dev lcov

      - name: Configure with coverage
        run: cmake -DBUILD_TESTS=ON -DENABLE_COVERAGE=ON -S . -B build

      - name: Build
        run: cmake --build build

      - name: Test
        run: cd build && ctest --output-on-failure --no-tests=error -T Test

      - name: Convert CTest results to JUnit XML
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET
          import glob

          test_xml = glob.glob("build/Testing/*/Test.xml")
          if not test_xml:
              print("No CTest results found")
              exit(1)

          ctest_tree = ET.parse(test_xml[0])
          ctest_root = ctest_tree.getroot()

          testsuites = ET.Element("testsuites")
          testsuite = ET.SubElement(testsuites, "testsuite", {
              "name": "kaufbot_tests",
              "tests": "0",
              "failures": "0",
              "errors": "0",
              "time": "0"
          })

          total_time = 0.0
          for test in ctest_root.findall(".//Test"):
              name = test.get("Name")
              status = test.get("Status")
              time_elem = test.find("Results/NamedMeasurement[@name='Execution Time']/Value")
              time_val = float(time_elem.text) if time_elem is not None and time_elem.text else 0.0
              total_time += time_val

              testcase = ET.SubElement(testsuite, "testcase", {
                  "name": name,
                  "classname": "kaufbot_tests",
                  "time": str(time_val)
              })

              if status != "passed":
                  failure = ET.SubElement(testcase, "failure")
                  failure.text = f"Test {name} failed with status: {status}"

              testsuite.set("tests", str(int(testsuite.get("tests")) + 1))
              if status != "passed":
                  testsuite.set("failures", str(int(testsuite.get("failures")) + 1))

          testsuite.set("time", str(total_time))
          ET.ElementTree(testsuites).write("build/test-results.xml", encoding="utf-8", xml_declaration=True)
          print("JUnit XML generated: build/test-results.xml")
          EOF

      - name: Publish Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          junit_files: build/test-results.xml
          check_name: Test Results (coverage)
          comment_mode: always

      - name: Generate coverage report
        run: cmake --build build --target coverage

      - name: Check coverage threshold
        run: |
          # Extract line coverage percentage from lcov summary
          COVERAGE=$(lcov --summary build/coverage_filtered.info 2>&1 | grep 'lines' | sed 's/.*: \([0-9.]*\)%.*/\1/')
          echo "Line coverage: ${COVERAGE}%"
          # Fail if below 60%
          if [ "$(echo "$COVERAGE < 60" | bc -l)" -eq 1 ]; then
            echo "::error::Line coverage ${COVERAGE}% is below the 60% minimum threshold"
            exit 1
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/coverage_report/
